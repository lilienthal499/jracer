<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<head>
    <title>JRacer - Racing in JavaScript</title>
    <script type="text/javascript">
        
        function init(){
        
            window_heigth = 600;
            
            createCar(carwidth, carlength);
            window.setInterval("view()", 1000 / fps);
            window.setInterval("physics()", speed);
            setBestzeit("Erste Runde");
        }
    </script>
    <script src="controller.js" type="text/javascript">
    </script>
    <script src="math.js" type="text/javascript">
    </script>
    <script src="view.js" type="text/javascript">
    </script>
    <script src="physx.js" type="text/javascript">
    </script>
    <script src="game.js" type="text/javascript">
    </script>
    <script src="map1/view.js" type="text/javascript">
    </script>
    <script src="map1/collision.js" type="text/javascript">

    <link rel="stylesheet" type="text/css" href="style.css">
    <style>
    </style>
</head>

    Dieses Spiel ist nur unter IE7 & IE6 getestet.
    <div id="positionierungspixel">
        <div id="screen" style="background-color:white; border:3px outset gray; background-color:#22B14C;">

                <img src="sheep.jpg" style="position:absolute; right:250px; bottom:120px;"><img src="sheep.jpg" style="position:absolute; right:520px; bottom:250px;"><img src="sheep.jpg" style="position:absolute; left:120px; top:150px;">

                <div style="width:1px; position:absolute; right:400px; top:500px; border:1px dashed white; height:100px;">
                </div>

            </div>
            <div id="cars" class="layer">

                    ESP

                <ul id="MessageArea">

        </div>
