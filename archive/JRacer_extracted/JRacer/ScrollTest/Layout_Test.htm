<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Screenlayout</title>
<style>
#pospixel {
position:absolute;
overflow:visible;
height:1px;
width:1px;
top:50%;
left:50%;

}
#screen {
position:absolute;
height:600px;
width:800px;
top:-300px;
left:-300px;
border:1px solid black;
overflow:hidden;
}

#screenarea{
position:absolute;
height:500px;
width:800px;
overflow:scroll;
}

#hud {
position:absolute;
width:100%;
height:100px;
background-color:gray;
bottom:0px;
}

#map {
position:absolute;
width:1000px;
height:1000px;
background-color:green;
}


</style>
</head>
<body>
<div id="pospixel">
<div id="screen">
<div id="screenarea">
<div id="map">Map!</div>
</div>
<div id="hud">Hud!</div>

</div>
</div>
</body>
</html>
