<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="css/style.css" />
    <title>JRacer - JavaScript Racing Game</title>
  </head>
  <body>
    <script src="js/application.js"></script>

    <script src="js/model.js"></script>
    <script src="js/view.js"></script>
    <script src="js/framemanager.js"></script>
    <script src="js/controller.js"></script>
    <script src="js/physicsengine.js"></script>
    <script src="js/track.js"></script>
    <script src="js/trackloader.js"></script>
    <script src="js/config.js"></script>
    <script>
      /*jslint browser: true*/
      /*global jracer*/

      // Load track before starting game
      async function loadAndStart() {
        const trackLoader = new jracer.TrackLoader();

        try {
          const trackData = await trackLoader.loadTrackSync(jracer.config.track.number);

          // Convert section strings to jracer.Track constants
          jracer.config.track.sections = trackData.sections.map(function(sectionName) {
            return jracer.Track[sectionName];
          });

          // Update grid size from track data
          jracer.config.track.gridSize = trackData.gridSize;

          console.log(`Loaded track: ${trackData.name} (${trackData.description})`);

          // Start the game
          jracer.startup(jracer.config);
        } catch (error) {
          console.error('Failed to load track:', error);
          document.body.innerHTML = '<h1>Error loading track</h1><p>' + error.message + '</p>';
        }
      }

      loadAndStart();
    </script>
  </body>
</html>
